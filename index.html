<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    h1 {
      color: #38bdf8;
    }
    .tier {
      margin: 20px;
      padding: 10px;
      border-radius: 10px;
    }
    .s { background: #ff4d4d; }
    .a { background: #ff944d; }
    .b { background: #ffd24d; }
    .player {
      margin: 5px;
      padding: 5px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <h1>🔥 KBTiers - PvP Rankings 🔥</h1>

  <div class="tier s">
    <h2>S Tier</h2>
    <div class="player">Player1</div>
    <div class="player">Player2</div>
  </div>

  <div class="tier a">
    <h2>A Tier</h2>
    <div class="player">Player3</div>
  </div>

  <div class="tier b">
    <h2>B Tier</h2>
    <div class="player">Player4</div>
  </div>

</body>
</html>
