<!DOCTYPE html>
<html>
<head>
  <title>KBTiers Rankings</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      color: #38bdf8;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      background: #1f2937;
    }

    .tab {
      padding: 8px 15px;
      background: #374151;
      border-radius: 5px;
      cursor: pointer;
    }

    .tab:hover {
      background: #4b5563;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
      background: #1f2937;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #1f2937;
      color: #9ca3af;
    }

    tr:nth-child(even) {
      background: #1f2937;
    }

    .rank {
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🏆 KBTiers Rankings</header>

<div class="tabs">
  <div class="tab">Overall</div>
  <div class="tab">Vanilla</div>
  <div class="tab">UHC</div>
  <div class="tab">Pot</div>
</div>

<div class="container">

  <input type="text" id="search" placeholder="Search player...">

  <table id="table">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Region</th>
        <th>Tier</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="rank">1</td><td>PlayerOne</td><td>NA</td><td>Tier 1</td></tr>
      <tr><td class="rank">2</td><td>PlayerTwo</td><td>EU</td><td>Tier 1</td></tr>
      <tr><td class="rank">3</td><td>PlayerThree</td><td>ASIA</td><td>Tier 2</td></tr>
      <tr><td class="rank">4</td><td>PlayerFour</td><td>NA</td><td>Tier 2</td></tr>
    </tbody>
  </table>

</div>

<script>
const search = document.getElementById("search");
const rows = document.querySelectorAll("#table tbody tr");

search.addEventListener("keyup", function() {
  const value = search.value.toLowerCase();

  rows.forEach(row => {
    const name = row.children[1].textContent.toLowerCase();
    row.style.display = name.includes(value) ? "" : "none";
  });
});
</script>

</body>
</html>
