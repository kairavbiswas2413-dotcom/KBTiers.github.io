<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #222;
      padding: 10px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #0f172a;
      color: #aaa;
      font-weight: normal;
    }

    td {
      background: #111827;
    }

    .gm-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #333;
      background: #111;
      margin-right: 6px;
      vertical-align: middle;
    }

    .HT { color: #ff4d4d; font-weight: bold; }
    .LT { color: #22c55e; font-weight: bold; }

  </style>
</head>

<body>

<header>KBTiers Rankings</header>

<div class="container">

<table>
  <thead>
    <tr>
      <th>Player</th>
      <th>Region</th>
      <th>Vanilla</th>
      <th>UHC</th>
      <th>POT</th>
      <th>Nethpot</th>
      <th>SMP</th>
      <th>Sword</th>
      <th>Axe</th>
      <th>Mace</th>
    </tr>
  </thead>

  <tbody>

    <!-- KairavOP -->
    <tr>
      <td>KairavOP</td>
      <td>AS</td>

      <td><img src="icons/vanilla.png" class="gm-icon"> HT4</td>
      <td><img src="icons/uhc.png" class="gm-icon"> HT5</td>
      <td><img src="icons/pot.png" class="gm-icon"> -</td>
      <td><img src="icons/nethpot.png" class="gm-icon"> HT4</td>
      <td><img src="icons/smp.png" class="gm-icon"> HT5</td>
      <td><img src="icons/sword.png" class="gm-icon"> LT4</td>
      <td><img src="icons/axe.png" class="gm-icon"> HT4</td>
      <td><img src="icons/mace.png" class="gm-icon"> LT3</td>
    </tr>

    <!-- NoxisCraft -->
    <tr>
      <td>NoxisCraft</td>
      <td>AS</td>

      <td><img src="icons/vanilla.png" class="gm-icon"> -</td>
      <td><img src="icons/uhc.png" class="gm-icon"> -</td>
      <td><img src="icons/pot.png" class="gm-icon"> -</td>
      <td><img src="icons/nethpot.png" class="gm-icon"> LT4</td>
      <td><img src="icons/smp.png" class="gm-icon"> -</td>
      <td><img src="icons/sword.png" class="gm-icon"> HT5</td>
      <td><img src="icons/axe.png" class="gm-icon"> -</td>
      <td><img src="icons/mace.png" class="gm-icon"> -</td>
    </tr>

  </tbody>
</table>

</div>

</body>
</html>
