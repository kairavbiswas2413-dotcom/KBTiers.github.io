<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .player {
      background: #111827;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .region {
      color: #aaa;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .box {
      background: #1f2937;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
    }

    .HT { color: #ff4d4d; font-weight: bold; }
    .LT { color: #22c55e; font-weight: bold; }

  </style>
</head>

<body>

<header>🏆 KBTiers Rankings</header>

<div class="container" id="app"></div>

<script>
const gamemodes = ["Vanilla","UHC","POT","Nethpot","SMP","Sword","Axe","Mace"];

const players = [
  {
    name: "KairavOP",
    region: "AS",
    stats: {
      Vanilla:"HT4",
      UHC:"HT5",
      POT:"",
      Nethpot:"HT4",
      SMP:"HT5",
      Sword:"LT4",
      Axe:"HT4",
      Mace:"LT3"
    }
  },
  {
    name: "NoxisCraft",
    region: "AS",
    stats: {
      Vanilla:"",
      UHC:"",
      POT:"",
      Nethpot:"LT4",
      SMP:"",
      Sword:"HT5",
      Axe:"",
      Mace:""
    }
  }
];

const app = document.getElementById("app");

players.forEach(p => {

  const div = document.createElement("div");
  div.className = "player";

  let grid = gamemodes.map(g => {
    let v = p.stats[g];

    if(!v) return `<div class="box">—</div>`;

    return `<div class="box ${v.startsWith("HT") ? "HT" : "LT"}">
      ${g}<br>${v}
    </div>`;
  }).join("");

  div.innerHTML = `
    <div class="top">
      <div class="name">${p.name}</div>
      <div class="region">${p.region}</div>
    </div>

    <div class="grid">
      ${grid}
    </div>
  `;

  app.appendChild(div);
});
</script>

</body>
</html>
