<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .name {
      font-weight: bold;
    }

    .region {
      color: #aaa;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      font-size: 13px;
    }

    .box {
      background: #1f2937;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }

    .HT { color: #ff4d4d; font-weight: bold; }
    .LT { color: #22c55e; font-weight: bold; }

  </style>
</head>

<body>

<header>🏆 KBTiers Rankings</header>

<div class="container" id="app"></div>

<script>
const gamemodes = ["Vanilla","UHC","POT","Nethpot","SMP","Sword","Axe","Mace"];

const data = [
  {
    name: "KairavOP",
    region: "AS",
    stats: {
      Vanilla: "HT4",
      UHC: "HT5",
      POT: "",
      Nethpot: "HT4",
      SMP: "HT5",
      Sword: "LT4",
      Axe: "HT4",
      Mace: "LT3"
    }
  },
  {
    name: "NoxisCraft",
    region: "AS",
    stats: {
      Vanilla: "",
      UHC: "",
      POT: "",
      Nethpot: "LT4",
      SMP: "",
      Sword: "HT5",
      Axe: "",
      Mace: ""
    }
  }
];

const app = document.getElementById("app");

data.forEach(p => {

  const div = document.createElement("div");
  div.className = "card";

  let grid = gamemodes.map(g => {
    let val = p.stats[g];

    if(!val) {
      return `<div class="box">—</div>`;
    }

    return `<div class="box ${val.startsWith("HT") ? "HT" : "LT"}">
      ${g}<br>${val}
    </div>`;
  }).join("");

  div.innerHTML = `
    <div class="top">
      <div class="name">${p.name}</div>
      <div class="region">${p.region}</div>
    </div>

    <div class="grid">
      ${grid}
    </div>
  `;

  app.appendChild(div);
});
</script>

</body>
</html>
