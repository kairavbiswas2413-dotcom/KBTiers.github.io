<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111827, #0b0f1a);
      color: white;
    }

    header {
      padding: 18px;
      font-size: 24px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    .discord-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #1e3a8a;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #0f172a;
      transition: 0.2s;
    }

    .discord-btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* SEARCH */
    .search-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }

    .search-box {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border: 1px solid #222;
      background: rgba(17,24,39,0.7);
      color: white;
      border-radius: 10px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.7;
      pointer-events: none;
    }

    /* BUTTON BAR */
    .gm-bar {
      display: flex;
      flex-wrap: nowrap;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
      padding: 10px;
      background: rgba(17,24,39,0.3);
      border: 1px solid #222;
      border-radius: 12px;
      overflow-x: auto;
    }

    .gm-btn {
      background: rgba(17,24,39,0.9);
      border: 1px solid #333;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      transition: 0.2s;
    }

    .gm-btn:hover {
      background: #1f2937;
      transform: scale(1.05);
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(17,24,39,0.5);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }

    th {
      color: #aaa;
      background: rgba(17,24,39,0.8);
    }

    tr:hover {
      background: rgba(31,41,55,0.6);
      cursor: pointer;
    }

    .player {
      font-weight: bold;
    }

    .points {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 3px;
    }

    /* BADGES */
    .HT {
      color: #ef4444;
      font-weight: bold;
    }

    .LT {
      color: #22c55e;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #0b1220;
      width: 340px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #222;
      text-align: center;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-content h2 {
      margin: 0;
    }

    .modal-content p {
      color: #9ca3af;
      margin: 5px 0 15px;
    }

    .modal-tiers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .close {
      position: absolute;
      right: 10px;
      top: 5px;
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>

<body>

<a href="https://discord.gg/n7cBmDQNX6" target="_blank" class="discord-btn">Discord</a>

<header>KBTiers Rankings</header>

<div class="container">

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-box" id="searchInput" placeholder="Search player..." onkeyup="searchPlayer()">
  <span class="search-icon">🔍</span>
</div>

<!-- GAMEMODES -->
<div class="gm-bar">
  <button class="gm-btn" onclick="showMode('all')">All</button>
  <button class="gm-btn" onclick="showMode('Vanilla')">Vanilla</button>
  <button class="gm-btn" onclick="showMode('UHC')">UHC</button>
  <button class="gm-btn" onclick="showMode('POT')">POT</button>
  <button class="gm-btn" onclick="showMode('Nethpot')">Nethpot</button>
  <button class="gm-btn" onclick="showMode('SMP')">SMP</button>
  <button class="gm-btn" onclick="showMode('Sword')">Sword</button>
  <button class="gm-btn" onclick="showMode('Axe')">Axe</button>
  <button class="gm-btn" onclick="showMode('Mace')">Mace</button>
</div>

<table id="tierTable">

<thead>
<tr>
  <th>Player</th>
  <th>Region</th>
  <th>Vanilla</th>
  <th>UHC</th>
  <th>POT</th>
  <th>Nethpot</th>
  <th>SMP</th>
  <th>Sword</th>
  <th>Axe</th>
  <th>Mace</th>
</tr>
</thead>

<tbody>

<tr onclick="openModal(this)">
  <td><div class="player">KairavOP</div><span class="points">170 pts</span></td>
  <td>AS</td>
  <td><span class="HT">HT4</span></td>
  <td><span class="HT">HT5</span></td>
  <td>-</td>
  <td><span class="HT">HT4</span></td>
  <td><span class="HT">HT5</span></td>
  <td><span class="LT">LT4</span></td>
  <td><span class="HT">HT4</span></td>
  <td><span class="LT">LT3</span></td>
</tr>

<tr onclick="openModal(this)">
  <td><div class="player">NoxisCraft</div><span class="points">55 pts</span></td>
  <td>AS</td>
  <td>-</td>
  <td>-</td>
  <td>-</td>
  <td><span class="LT">LT4</span></td>
  <td>-</td>
  <td><span class="HT">HT5</span></td>
  <td>-</td>
  <td>-</td>
</tr>

</tbody>

</table>

</div>

<!-- MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="modalName"></h2>
    <p id="modalRegion"></p>
    <div id="modalTiers" class="modal-tiers"></div>
  </div>
</div>

<script>
function searchPlayer() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let rows = document.querySelectorAll("#tierTable tbody tr");

  rows.forEach(row => {
    let name = row.querySelector(".player").innerText.toLowerCase();
    row.style.display = name.includes(input) ? "" : "none";
  });
}

function showMode(mode) {
  let rows = document.querySelectorAll("#tierTable tbody tr");

  let map = {
    "Vanilla": 2,
    "UHC": 3,
    "POT": 4,
    "Nethpot": 5,
    "SMP": 6,
    "Sword": 7,
    "Axe": 8,
    "Mace": 9
  };

  let cols = [2,3,4,5,6,7,8,9];

  rows.forEach(row => {

    if (mode === "all") {
      row.style.display = "";
      cols.forEach(c => {
        if (row.cells[c]) row.cells[c].style.display = "";
      });
      return;
    }

    let col = map[mode];
    let cell = row.cells[col];

    if (!cell || cell.innerText.trim() === "-" ) {
      row.style.display = "none";
      return;
    }

    row.style.display = "";

    cols.forEach(c => {
      if (row.cells[c]) {
        row.cells[c].style.display = (c === col) ? "" : "none";
      }
    });
  });
}

/* MODAL */
function openModal(row) {
  let cells = row.cells;

  document.getElementById("playerModal").style.display = "block";
  document.getElementById("modalName").innerText =
    row.querySelector(".player").innerText;

  document.getElementById("modalRegion").innerText =
    "Region - " + cells[1].innerText;

  let gm = ["Vanilla","UHC","POT","Nethpot","SMP","Sword","Axe","Mace"];
  let html = "";

  for (let i = 0; i < gm.length; i++) {
    let val = cells[i+2].innerText.trim();
    if (val !== "-" && val !== "") {
      html += `<div>${gm[i]}  ${val}</div>`;
    }
  }

  document.getElementById("modalTiers").innerHTML = html;
}

function closeModal() {
  document.getElementById("playerModal").style.display = "none";
}
</script>

</body>
</html>
