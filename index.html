<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .player {
      background: #111827;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .region {
      color: #aaa;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .line {
      margin: 5px 0;
    }

    .HT {
      color: #ff4d4d;
      font-weight: bold;
    }

    .LT {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🏆 KBTiers Rankings</header>

<div class="container">

  <!-- KairavOP -->
  <div class="player">
    <div class="title">KairavOP</div>
    <div class="region">AS</div>

    <div class="line">Nethpot - <span class="HT">HT4</span></div>
    <div class="line">Sword - <span class="LT">LT4</span></div>
    <div class="line">UHC - <span class="HT">HT5</span></div>
    <div class="line">Axe - <span class="HT">HT4</span></div>
    <div class="line">Mace - <span class="LT">LT3</span></div>
    <div class="line">Vanilla - <span class="HT">HT4</span></div>
    <div class="line">SMP - <span class="HT">HT5</span></div>
  </div>

  <!-- NoxisCraft -->
  <div class="player">
    <div class="title">NoxisCraft</div>
    <div class="region">AS</div>

    <div class="line">Nethpot - <span class="LT">LT4</span></div>
    <div class="line">Sword - <span class="HT">HT5</span></div>
    <div class="line">UHC - —</div>
    <div class="line">Axe - —</div>
    <div class="line">Mace - —</div>
    <div class="line">Vanilla - —</div>
    <div class="line">SMP - —</div>
  </div>

</div>

</body>
</html>
