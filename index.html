<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>

  <style>
    body { margin:0; font-family:Arial; background:radial-gradient(circle at top,#111827,#0b0f1a); color:white; }
    header { padding:18px; font-size:24px; text-align:center; border-bottom:1px solid #222; }
    .discord-btn { position:absolute; top:15px; left:15px; background:#1e3a8a; color:white; padding:10px 16px; border-radius:10px; text-decoration:none; font-size:13px; font-weight:bold; }
    .container { max-width:1100px; margin:auto; padding:20px; }
    .search-box { width:100%; padding:12px; border:1px solid #222; background:#111827; color:white; border-radius:10px; }
    .gm-bar { display:flex; gap:10px; margin:18px 0; }
    .gm-btn { background:#111827; border:1px solid #333; color:white; padding:10px; border-radius:10px; cursor:pointer; }
    table { width:100%; border-collapse:collapse; background:#111827; }
    th,td { padding:10px; border-bottom:1px solid #222; text-align:center; }
    tr:hover { background:#1f2937; cursor:pointer; }
  </style>
</head>

<body>

<a href="https://discord.gg/n7cBmDQNX6" class="discord-btn">Discord</a>

<header>KBTiers Rankings</header>

<div class="container">

<input class="search-box" id="searchInput" placeholder="Search..." onkeyup="searchPlayer()">

<div class="gm-bar">
  <button class="gm-btn" onclick="showMode('all')">All</button>
  <button class="gm-btn" onclick="showMode('Vanilla')">Vanilla</button>
  <button class="gm-btn" onclick="showMode('UHC')">UHC</button>
  <button class="gm-btn" onclick="showMode('POT')">POT</button>
  <button class="gm-btn" onclick="showMode('Nethpot')">Nethpot</button>
  <button class="gm-btn" onclick="showMode('SMP')">SMP</button>
  <button class="gm-btn" onclick="showMode('Sword')">Sword</button>
  <button class="gm-btn" onclick="showMode('Axe')">Axe</button>
  <button class="gm-btn" onclick="showMode('Mace')">Mace</button>
</div>

<table id="tierTable">
<thead>
<tr>
  <th>Player</th>
  <th>Region</th>
  <th>Vanilla</th>
  <th>UHC</th>
  <th>POT</th>
  <th>Nethpot</th>
  <th>SMP</th>
  <th>Sword</th>
  <th>Axe</th>
  <th>Mace</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

// 🔥 LOAD FROM BOT
fetch("https://kbtiers-bot.onrender.com/players")
  .then(res => res.json())
  .then(data => {
    let tbody = document.querySelector("#tierTable tbody");
    let modes = ["Vanilla","UHC","POT","Nethpot","SMP","Sword","Axe","Mace"];

    for (let player in data) {
      let row = "<tr>";
      row += `<td class="player">${player}</td>`;
      row += `<td>${data[player].region}</td>`;

      modes.forEach(m => {
        row += `<td>${data[player].tiers[m] || "-"}</td>`;
      });

      row += "</tr>";
      tbody.innerHTML += row;
    }
  });

// SEARCH
function searchPlayer() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll("#tierTable tbody tr").forEach(row => {
    let name = row.innerText.toLowerCase();
    row.style.display = name.includes(input) ? "" : "none";
  });
}

// FILTER
function showMode(mode) {
  let rows = document.querySelectorAll("#tierTable tbody tr");
  let map = {Vanilla:2,UHC:3,POT:4,Nethpot:5,SMP:6,Sword:7,Axe:8,Mace:9};

  rows.forEach(row => {
    for (let i=2;i<=9;i++) row.cells[i].style.display="";

    if(mode==="all"){row.style.display="";return;}

    let col=map[mode];
    if(row.cells[col].innerText=="-"){row.style.display="none";return;}

    row.style.display="";
    for(let i=2;i<=9;i++) if(i!==col) row.cells[i].style.display="none";
  });
}

</script>

</body>
</html>
