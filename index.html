<!DOCTYPE html>
<html>
<head>
  <title>KBTiers</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 { color: #38bdf8; }

    .tier {
      display: flex;
      align-items: center;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .label {
      width: 80px;
      font-weight: bold;
    }

    .dropzone {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 10px;
      min-height: 60px;
      border: 2px dashed #444;
    }

    .item {
      padding: 8px;
      background: #1e293b;
      border-radius: 5px;
      cursor: grab;
    }

    .pool {
      margin-top: 20px;
      padding: 10px;
      border: 2px solid #555;
    }
  </style>
</head>

<body>
  <h1>🔥 KBTiers 🔥</h1>

  <div class="tier" style="background:#ff4d4d;">
    <div class="label">S</div>
    <div class="dropzone"></div>
  </div>

  <div class="tier" style="background:#ff944d;">
    <div class="label">A</div>
    <div class="dropzone"></div>
  </div>

  <div class="tier" style="background:#ffd24d;">
    <div class="label">B</div>
    <div class="dropzone"></div>
  </div>

  <h2>Drag from here 👇</h2>
  <div class="pool dropzone">
    <div class="item" draggable="true">Player1</div>
    <div class="item" draggable="true">Player2</div>
    <div class="item" draggable="true">Player3</div>
  </div>

<script>
let dragged;

document.querySelectorAll('.item').forEach(item => {
  item.addEventListener('dragstart', e => {
    dragged = item;
  });
});

document.querySelectorAll('.dropzone').forEach(zone => {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
  });

  zone.addEventListener('drop', e => {
    zone.appendChild(dragged);
  });
});
</script>

</body>
</html>
